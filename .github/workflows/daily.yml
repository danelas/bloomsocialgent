name: Daily content generation

on:
  schedule:
    # 5:30 AM ET → posts get scheduled forward to 9 / 12 / 8 ET slot times
    - cron: "30 9 * * *"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (generate but don't upload)"
        type: boolean
        default: false
      slot:
        description: "Single slot only (A, B, or C). Leave blank for all."
        type: string
        default: ""

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      # System libraries Chromium needs for Remotion's headless render on Ubuntu.
      # Without these, Chromium spawns and immediately crashes with no clear error.
      - name: Install Chromium system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libnss3 \
            libatk-bridge2.0-0 \
            libdrm2 \
            libxkbcommon0 \
            libxcomposite1 \
            libxdamage1 \
            libxfixes3 \
            libxrandr2 \
            libgbm1 \
            libpango-1.0-0 \
            libcairo2 \
            libasound2t64 \
            fonts-liberation \
            fonts-noto-color-emoji

      - name: Install bloom-remotion-ui deps
        run: npm install --no-audit --no-fund
        working-directory: bloom-remotion-ui

      - name: Install bloom-roster-agent deps
        run: npm install --no-audit --no-fund
        working-directory: bloom-roster-agent

      # Pre-warm the Chrome download so the first render isn't slow.
      # Uses the locally-installed Remotion CLI (which we just npm-installed above).
      - name: Pre-install Chrome for Remotion
        run: npx remotion browser ensure
        working-directory: bloom-remotion-ui

      # Diagnostic: print env var LENGTHS (not values) so we can see which
      # secrets are reaching the runner. A length of 0 means the secret isn't
      # set in repo settings, has a typo'd name, or is on the wrong repo.
      - name: Verify secrets are present
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          UPLOAD_POST_API_KEY: ${{ secrets.UPLOAD_POST_API_KEY }}
          UPLOAD_POST_USER: ${{ secrets.UPLOAD_POST_USER }}
        run: |
          echo "ANTHROPIC_API_KEY length: ${#ANTHROPIC_API_KEY}"
          echo "OPENAI_API_KEY length: ${#OPENAI_API_KEY}"
          echo "UPLOAD_POST_API_KEY length: ${#UPLOAD_POST_API_KEY}"
          echo "UPLOAD_POST_USER length: ${#UPLOAD_POST_USER}"
          if [ -z "$ANTHROPIC_API_KEY" ]; then
            echo "::error::ANTHROPIC_API_KEY is missing or empty. Add it at https://github.com/danelas/bloomsocialgent/settings/secrets/actions"
            exit 1
          fi
          if [ -z "$OPENAI_API_KEY" ]; then
            echo "::error::OPENAI_API_KEY is missing or empty"
            exit 1
          fi

      - name: Run daily generation
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          UPLOAD_POST_API_KEY: ${{ secrets.UPLOAD_POST_API_KEY }}
          UPLOAD_POST_USER: ${{ secrets.UPLOAD_POST_USER }}
        working-directory: bloom-roster-agent
        run: |
          ARGS=""
          if [ "${{ inputs.dry_run }}" = "true" ]; then ARGS="$ARGS --dry-run"; fi
          if [ -n "${{ inputs.slot }}" ]; then ARGS="$ARGS --slot=${{ inputs.slot }}"; fi
          npx tsx src/index.ts $ARGS

      - name: Upload preview artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: preview-${{ github.run_id }}
          path: bloom-roster-agent/preview/
          retention-days: 7
          if-no-files-found: ignore
